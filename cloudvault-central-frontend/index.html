<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="en" />
    <title>TrustVault Central</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cv_theme');
          var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      }
      html.dark body {
        background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      }
      #root {
        min-height: 100%;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="notranslate" translate="no">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
